[mod-name]
real-rain=Real Rain

[mod-description]
real-rain=AAA-style rain ambience for Nauvis with staged storms, rain-only mode, thunder+rain mode, full thunderstorm mode, layered rainfall, wind gusts, tile-aware ground splashes, bolt-free lightning flashes linked to thunder, post-rain drips, solar reduction, pollution washout, fire extinguishing, and immediate test commands.

