[mod-setting-description]
real-rain-aaa-preset=Subtle keeps rain light. Balanced is the default cinematic pass. Storm and Monsoon increase density, splashes, wind, and thunder frequency.
real-rain-intensity=Main visual density multiplier. Higher values make rain thicker but cost more UPS/GPU.
real-rain-wind-strength=Controls how often visible wind gust angles are used. 0 keeps the rain mostly straight.
real-rain-ground-splashes-enabled=Adds small water impacts/ripples around the view. Disable for extra performance.
real-rain-tile-splashes-enabled=Makes rain splash harder on concrete/factory floors, softer on dirt/grass, and ripple on water.
real-rain-biome-ambience-enabled=Changes rain ambience around forests, factory floors, and water so rain feels tied to the world.
real-rain-wind-sound-enabled=Adds occasional low wind gust ambience during stronger visible gusts.
real-rain-ups-mode=Cinematic gives the thickest FX. Balanced is recommended. Saver lowers particle budgets and simplifies tile splash logic.
real-rain-nauvis-only=Keeps rain on Nauvis only. Disable only if you want all generated surfaces to use the weather cycle.
real-rain-storm-stages-enabled=Rain events ramp through drizzle, rain, heavy rain, storm, and sometimes monsoon before fading out.
real-rain-monsoon-chance=Chance that a new rain event becomes a rare high-intensity monsoon sequence.
real-rain-post-rain-enabled=After rain ends, leaves a short tail of puddle ripples and soft drips instead of stopping instantly.
real-rain-post-rain-min-seconds=Minimum post-rain tail duration.
real-rain-post-rain-max-seconds=Maximum post-rain tail duration.
real-rain-wet-min-hours=Minimum possible rain duration in in-game hours.
real-rain-wet-max-hours=Maximum possible rain duration in in-game hours.
real-rain-wet-power=Controls whether rain events tend to be shorter or longer. 1 is uniform; higher values favour shorter rain.
real-rain-dry-mean-hours=Average dry time between rain events in in-game hours. Lower values make rain more frequent.
real-rain-volume-modifier=Rain ambience volume multiplier from 0 to 1.
real-rain-thunder-volume-modifier=Thunder volume multiplier from 0 to 1.
real-rain-thunder-layering-enabled=Adds delayed rolling thunder after close lightning strikes. Gives storms more depth, with a tiny sound-only cost.
real-rain-min-thunder-chance=Base thunder chance. Lower values make thunder rare.
real-rain-max-thunder-chance=Peak thunder chance. Higher values make storms louder and more active.
real-rain-fire-extinguish-enabled=When enabled, rain will hiss and put out fires.
real-rain-solar-power-multiplier=Solar efficiency during rain. -1 disables the solar effect; 50 means half output; 0 means no solar output.
real-rain-pollution-cleanup-per-minute=Pollution removed per chunk per minute while it rains. 0 disables pollution washout.
real-rain-pollution-max-chunks-per-tick=Maximum pollution chunks processed per tick. Lower values improve performance on very large maps.

